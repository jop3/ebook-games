name: Build roborally.app

# Builds the PocketBook ARM .app in the cloud using the PocketBook Go SDK Docker
# image. This is the heavier job (pulls the SDK container + cross-compiles), so
# it runs on meaningful events rather than every feature-branch commit:
#   • push to main/master                   (keeps a fresh .app artifact on main)
#   • publish a GitHub Release              (Releases → Draft a new release → Publish)
#   • push a version tag  v* / roborally-v* (git tag v1.0.0 && git push origin v1.0.0)
#   • click "Run workflow" on the Actions tab (workflow_dispatch)
#
# Every run uploads the binary as the "roborally-app" artifact; a published
# Release also gets roborally.app attached as a downloadable asset. Then copy
# roborally.app into the device's applications/ folder (POCKETBOOK_GAMEDEV_GUIDE §7–§8).
# (Fast container-free tests run separately on every push — see roborally-ci.yml.)

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
      - 'roborally-v*'
  release:
    types: [published]
  workflow_dispatch:

# Only one build per ref at a time; a newer trigger cancels an in-flight one.
concurrency:
  group: roborally-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # attach the .app asset to a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build roborally.app in the PocketBook Go SDK container
        run: |
          set -euxo pipefail
          # The SDK image bundles the patched Go toolchain, libinkview and the
          # arm-obreey clang cross-compiler. Mount only the roborally module.
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/roborally:/app" \
            -w /app \
            sunsung/pocketbook-go-sdk:latest \
            build -o roborally.app .

      - name: Verify it is an ARM binary
        run: |
          set -euxo pipefail
          ls -la roborally/roborally.app
          file roborally/roborally.app
          file roborally/roborally.app | grep -q "ARM" \
            || { echo "::error::roborally.app is not an ARM binary"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roborally-app
          path: roborally/roborally.app
          if-no-files-found: error

      - name: Attach to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" roborally/roborally.app --clobber
