name: roborally CI (tests)

# Fast, container-free checks on every push and PR: go vet, the pure game-logic
# unit tests, and the headless play-test suite (which boots the real app and
# plays full games through the touch UI). No Docker, no device — runs in seconds,
# so it's cheap to run on everything.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: roborally-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet + unit tests (pure game logic)
        working-directory: roborally
        run: |
          set -euxo pipefail
          go vet ./game/
          go test ./game/

      - name: Play-test suite (headless full games through the UI)
        run: bash playtest/play.sh roborally
